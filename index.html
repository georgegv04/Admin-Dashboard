<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="dashboard">
      <aside class="sidebar">
        <div class="logo">
          <span class="logo-icon">▦</span>
          <h1>Dashboard</h1>
        </div>

        <nav class="nav">
          <a class="nav-item" href="#">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
          </a>
          <a class="nav-item" href="#">
            <span class="nav-icon">👤</span>
            <span>Profile</span>
          </a>
          <a class="nav-item" href="#">
            <span class="nav-icon">💬</span>
            <span>Messages</span>
          </a>
          <a class="nav-item" href="#">
            <span class="nav-icon">🕘</span>
            <span>History</span>
          </a>
          <a class="nav-item" href="#">
            <span class="nav-icon">✅</span>
            <span>Tasks</span>
          </a>
          <a class="nav-item" href="#">
            <span class="nav-icon">👥</span>
            <span>Communities</span>
          </a>
        </nav>

        <nav class="nav nav-bottom">
          <a class="nav-item" href="#">
            <span class="nav-icon">⚙️</span>
            <span>Settings</span>
          </a>
          <a class="nav-item" href="#">
            <span class="nav-icon">❓</span>
            <span>Support</span>
          </a>
          <a class="nav-item" href="#">
            <span class="nav-icon">🔒</span>
            <span>Privacy</span>
          </a>
        </nav>
      </aside>

      <header class="header">
        <div class="header-top">
          <div class="search">
            <span class="search-icon">🔍</span>
            <input id="site-search" type="text" placeholder="Search" />
          </div>
          <div class="user-mini">
            <button class="bell-icon" type="button">🔔</button>
            <span class="avatar avatar-small">GV</span>
            <strong class="user-name">George Vasilev</strong>
          </div>
        </div>

        <div class="header-bottom">
          <div class="welcome">
            <span class="avatar avatar-large">GV</span>
            <div class="greeting">
              <p>Hi there,</p>
              <h2>George Vasilev (@Gio)</h2>
            </div>
          </div>
          <div class="actions">
            <button>New</button>
            <button>Upload</button>
            <button>Share</button>
          </div>
        </div>
      </header>

      <main class="main-content"></main>
    </div>
  </body>
</html>
